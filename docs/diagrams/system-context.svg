<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow-navy" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#11567F"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#29B5E8"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>
  <!-- Outer container -->
  <rect x="20" y="20" width="1400" height="860" rx="8" fill="#F2FAFE" stroke="#E8F6FD"/>
  <!-- Title bar -->
  <rect x="40" y="35" width="1360" height="50" rx="6" fill="#11567F"/>
  <text x="60" y="66" fill="#FFFFFF" font-size="16" font-weight="bold">CALL CENTER AI — SYSTEM CONTEXT DIAGRAM</text>
  <rect x="1230" y="44" width="150" height="30" rx="4" fill="#29B5E8"/>
  <text x="1258" y="64" fill="#FFFFFF" font-size="11" font-weight="bold">Snowflake Cortex AI</text>

  <!-- Central System -->
  <rect x="430" y="300" width="580" height="280" rx="12" fill="#29B5E8" fill-opacity="0.15" stroke="#11567F" stroke-width="3" filter="url(#shadow)"/>
  <text x="720" y="340" fill="#11567F" font-size="20" font-weight="bold" text-anchor="middle">Call Center AI Demo</text>
  <text x="720" y="390" fill="#11567F" font-size="12" text-anchor="middle">React Frontend  -  FastAPI Backend</text>
  <text x="720" y="410" fill="#11567F" font-size="12" text-anchor="middle">AI Pipeline  -  WebSocket Server</text>
  <text x="720" y="448" fill="#11567F" font-size="10" font-style="italic" text-anchor="middle">Processes live audio streams, transcribes speech,</text>
  <text x="720" y="464" fill="#11567F" font-size="10" font-style="italic" text-anchor="middle">extracts entities, matches products &amp; cases,</text>
  <text x="720" y="480" fill="#11567F" font-size="10" font-style="italic" text-anchor="middle">generates AI recommendations</text>

  <!-- Actor: Agent / Presenter (Left) -->
  <rect x="60" y="365" width="240" height="150" rx="8" fill="#FFFFFF" stroke="#11567F" stroke-width="2" filter="url(#shadow)"/>
  <text x="180" y="395" fill="#11567F" font-size="14" font-weight="bold" text-anchor="middle">Agent / Presenter</text>
  <text x="180" y="430" fill="#11567F" font-size="10" text-anchor="middle">Initiates calls, views real-time</text>
  <text x="180" y="446" fill="#11567F" font-size="10" text-anchor="middle">AI insights, manages demo</text>

  <!-- Actor: Snowflake Cortex (Right) -->
  <rect x="1140" y="330" width="240" height="220" rx="8" fill="#FFFFFF" stroke="#29B5E8" stroke-width="2" filter="url(#shadow)"/>
  <text x="1260" y="358" fill="#11567F" font-size="14" font-weight="bold" text-anchor="middle">Snowflake Cortex</text>
  <text x="1260" y="390" fill="#11567F" font-size="11" text-anchor="middle">AI_TRANSCRIBE</text>
  <text x="1260" y="410" fill="#11567F" font-size="11" text-anchor="middle">AI_EXTRACT</text>
  <text x="1260" y="430" fill="#11567F" font-size="11" text-anchor="middle">AI_SIMILARITY</text>
  <text x="1260" y="450" fill="#11567F" font-size="11" text-anchor="middle">AI_COMPLETE</text>
  <text x="1260" y="478" fill="#11567F" font-size="11" text-anchor="middle">Hybrid Tables</text>
  <text x="1260" y="498" fill="#11567F" font-size="11" text-anchor="middle">Internal Stage</text>

  <!-- Actor: Audio Source (Top) -->
  <rect x="560" y="120" width="320" height="100" rx="8" fill="#FFFFFF" stroke="#11567F" stroke-width="2" filter="url(#shadow)"/>
  <text x="720" y="152" fill="#11567F" font-size="14" font-weight="bold" text-anchor="middle">Audio Source</text>
  <text x="720" y="180" fill="#11567F" font-size="10" text-anchor="middle">Pre-recorded MP3 demo calls</text>
  <text x="720" y="196" fill="#11567F" font-size="10" text-anchor="middle">chunked via ffmpeg pipeline</text>

  <!-- Actor: Browser (Bottom) -->
  <rect x="560" y="670" width="320" height="100" rx="8" fill="#FFFFFF" stroke="#11567F" stroke-width="2" filter="url(#shadow)"/>
  <text x="720" y="700" fill="#11567F" font-size="14" font-weight="bold" text-anchor="middle">Browser</text>
  <text x="720" y="730" fill="#11567F" font-size="10" text-anchor="middle">Renders React UI, receives</text>
  <text x="720" y="746" fill="#11567F" font-size="10" text-anchor="middle">real-time updates via WebSocket</text>

  <!-- Arrow: Agent -> System -->
  <line x1="300" y1="440" x2="425" y2="440" stroke="#11567F" stroke-width="2" marker-end="url(#arrow-navy)"/>
  <text x="330" y="432" fill="#11567F" font-size="10">Controls &amp; Monitors</text>

  <!-- Arrow: System -> Snowflake (out) -->
  <line x1="1010" y1="410" x2="1135" y2="410" stroke="#29B5E8" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="1030" y="402" fill="#11567F" font-size="10">SQL Queries + PUT</text>

  <!-- Arrow: Snowflake -> System (back) -->
  <line x1="1135" y1="470" x2="1010" y2="470" stroke="#29B5E8" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="1030" y="490" fill="#11567F" font-size="10">AI Results + Data</text>

  <!-- Arrow: Audio -> System -->
  <line x1="720" y1="220" x2="720" y2="296" stroke="#11567F" stroke-width="2" marker-end="url(#arrow-navy)"/>
  <text x="730" y="262" fill="#11567F" font-size="10">Audio Chunks (MP3)</text>

  <!-- Arrow: System -> Browser -->
  <line x1="720" y1="584" x2="720" y2="666" stroke="#11567F" stroke-width="2" marker-end="url(#arrow-navy)"/>
  <text x="730" y="630" fill="#11567F" font-size="10">WebSocket Events</text>
</svg>
