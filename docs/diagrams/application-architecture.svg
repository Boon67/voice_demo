<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#29B5E8"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>
  <!-- Outer container -->
  <rect x="20" y="20" width="1400" height="860" rx="8" fill="#F2FAFE" stroke="#E8F6FD"/>
  <!-- Title bar -->
  <rect x="40" y="35" width="1360" height="50" rx="6" fill="#11567F"/>
  <text x="60" y="66" fill="#FFFFFF" font-size="16" font-weight="bold">CALL CENTER AI — APPLICATION ARCHITECTURE</text>
  <rect x="1230" y="44" width="150" height="30" rx="4" fill="#29B5E8"/>
  <text x="1258" y="64" fill="#FFFFFF" font-size="11" font-weight="bold">Snowflake Cortex AI</text>

  <!-- Layer 1: Frontend -->
  <rect x="60" y="100" width="1320" height="195" rx="6" fill="#EBF5FB" stroke="#D6EAF8"/>
  <text x="75" y="118" fill="#11567F" font-size="12" font-weight="bold">FRONTEND  (React - port 3000)</text>
  <!-- Header -->
  <rect x="80" y="132" width="1280" height="28" rx="4" fill="#FFFFFF" stroke="#29B5E8" stroke-width="2" filter="url(#shadow)"/>
  <text x="720" y="151" fill="#11567F" font-size="11" font-weight="bold" text-anchor="middle">Header</text>
  <!-- CallControls sidebar -->
  <rect x="80" y="168" width="160" height="110" rx="4" fill="#FFFFFF" stroke="#29B5E8" stroke-width="2" filter="url(#shadow)"/>
  <text x="160" y="220" fill="#11567F" font-size="11" font-weight="bold" text-anchor="middle">CallControls</text>
  <text x="160" y="236" fill="#11567F" font-size="9" text-anchor="middle">(Sidebar)</text>
  <!-- Center panels -->
  <text x="445" y="162" fill="#29B5E8" font-size="9" font-style="italic">Center Panel</text>
  <rect x="260" y="168" width="170" height="48" rx="4" fill="#FFFFFF" stroke="#29B5E8" stroke-width="2" filter="url(#shadow)"/>
  <text x="345" y="197" fill="#11567F" font-size="10" font-weight="bold" text-anchor="middle">CallSummary</text>
  <rect x="445" y="168" width="170" height="48" rx="4" fill="#FFFFFF" stroke="#29B5E8" stroke-width="2" filter="url(#shadow)"/>
  <text x="530" y="197" fill="#11567F" font-size="10" font-weight="bold" text-anchor="middle">CustomerLookup</text>
  <rect x="630" y="168" width="170" height="48" rx="4" fill="#FFFFFF" stroke="#29B5E8" stroke-width="2" filter="url(#shadow)"/>
  <text x="715" y="197" fill="#11567F" font-size="10" font-weight="bold" text-anchor="middle">ProductMatch</text>
  <rect x="260" y="226" width="170" height="48" rx="4" fill="#FFFFFF" stroke="#29B5E8" stroke-width="2" filter="url(#shadow)"/>
  <text x="345" y="255" fill="#11567F" font-size="10" font-weight="bold" text-anchor="middle">SimilarCases</text>
  <rect x="445" y="226" width="170" height="48" rx="4" fill="#FFFFFF" stroke="#29B5E8" stroke-width="2" filter="url(#shadow)"/>
  <text x="530" y="255" fill="#11567F" font-size="10" font-weight="bold" text-anchor="middle">ResolutionCard</text>
  <!-- TranscriptPanel -->
  <rect x="1000" y="168" width="340" height="110" rx="4" fill="#FFFFFF" stroke="#29B5E8" stroke-width="2" filter="url(#shadow)"/>
  <text x="1170" y="228" fill="#11567F" font-size="11" font-weight="bold" text-anchor="middle">TranscriptPanel</text>

  <!-- Arrow: Frontend -> Backend -->
  <line x1="700" y1="300" x2="700" y2="335" stroke="#29B5E8" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="715" y="322" fill="#11567F" font-size="10">WebSocket + REST</text>

  <!-- Layer 2: Backend -->
  <rect x="60" y="330" width="1320" height="150" rx="6" fill="#D6EAF8" stroke="#29B5E8"/>
  <text x="75" y="348" fill="#11567F" font-size="12" font-weight="bold">BACKEND  (FastAPI - port 8080)</text>
  <rect x="100" y="365" width="240" height="50" rx="4" fill="#FFFFFF" stroke="#29B5E8" stroke-width="2" filter="url(#shadow)"/>
  <text x="220" y="395" fill="#11567F" font-size="12" font-weight="bold" text-anchor="middle">FastAPI Routes</text>
  <rect x="100" y="422" width="240" height="44" rx="4" fill="#FFFFFF" stroke="#29B5E8" stroke-width="2" filter="url(#shadow)"/>
  <text x="220" y="449" fill="#11567F" font-size="12" font-weight="bold" text-anchor="middle">WebSocket Server</text>
  <rect x="440" y="365" width="320" height="50" rx="4" fill="#FFFFFF" stroke="#29B5E8" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="395" fill="#11567F" font-size="12" font-weight="bold" text-anchor="middle">AI Pipeline Orchestrator</text>
  <rect x="440" y="422" width="320" height="44" rx="4" fill="#FFFFFF" stroke="#29B5E8" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="449" fill="#11567F" font-size="12" font-weight="bold" text-anchor="middle">Audio Player</text>
  <rect x="860" y="365" width="240" height="50" rx="4" fill="#FFFFFF" stroke="#29B5E8" stroke-width="2" filter="url(#shadow)"/>
  <text x="980" y="395" fill="#11567F" font-size="12" font-weight="bold" text-anchor="middle">snowflake_ops.py</text>
  <rect x="860" y="422" width="240" height="44" rx="4" fill="#FFFFFF" stroke="#29B5E8" stroke-width="2" filter="url(#shadow)"/>
  <text x="980" y="449" fill="#11567F" font-size="12" font-weight="bold" text-anchor="middle">config.py</text>

  <!-- Arrow: Backend -> Snowflake AI -->
  <line x1="700" y1="485" x2="700" y2="520" stroke="#29B5E8" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="715" y="508" fill="#11567F" font-size="10">Snowflake Connector</text>

  <!-- Layer 3: Snowflake AI -->
  <rect x="60" y="515" width="1320" height="110" rx="6" fill="#29B5E8" fill-opacity="0.12" stroke="#29B5E8"/>
  <text x="75" y="533" fill="#11567F" font-size="12" font-weight="bold">SNOWFLAKE AI  (Cortex Functions)</text>
  <rect x="100" y="550" width="180" height="44" rx="4" fill="#29B5E8" stroke="#11567F"/>
  <text x="190" y="577" fill="#FFFFFF" font-size="11" font-weight="bold" text-anchor="middle">AI_TRANSCRIBE</text>
  <rect x="360" y="550" width="180" height="44" rx="4" fill="#29B5E8" stroke="#11567F"/>
  <text x="450" y="577" fill="#FFFFFF" font-size="11" font-weight="bold" text-anchor="middle">AI_EXTRACT</text>
  <rect x="620" y="550" width="180" height="44" rx="4" fill="#29B5E8" stroke="#11567F"/>
  <text x="710" y="577" fill="#FFFFFF" font-size="11" font-weight="bold" text-anchor="middle">AI_SIMILARITY</text>
  <rect x="880" y="550" width="180" height="44" rx="4" fill="#29B5E8" stroke="#11567F"/>
  <text x="970" y="577" fill="#FFFFFF" font-size="11" font-weight="bold" text-anchor="middle">AI_COMPLETE</text>

  <!-- Arrow: Snowflake AI -> Data Layer -->
  <line x1="700" y1="630" x2="700" y2="660" stroke="#29B5E8" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Layer 4: Data Layer -->
  <rect x="60" y="655" width="1320" height="195" rx="6" fill="#11567F"/>
  <text x="75" y="675" fill="#FFFFFF" font-size="12" font-weight="bold">DATA LAYER  (Snowflake Storage)</text>
  <text x="100" y="700" fill="#29B5E8" font-size="10" font-weight="bold">Hybrid Tables</text>
  <rect x="100" y="712" width="130" height="32" rx="4" fill="#FFFFFF" stroke="#E8F6FD"/>
  <text x="165" y="733" fill="#11567F" font-size="10" font-weight="bold" text-anchor="middle">CUSTOMERS</text>
  <rect x="245" y="712" width="130" height="32" rx="4" fill="#FFFFFF" stroke="#E8F6FD"/>
  <text x="310" y="733" fill="#11567F" font-size="10" font-weight="bold" text-anchor="middle">PRODUCTS</text>
  <rect x="390" y="712" width="130" height="32" rx="4" fill="#FFFFFF" stroke="#E8F6FD"/>
  <text x="455" y="733" fill="#11567F" font-size="10" font-weight="bold" text-anchor="middle">ORDERS</text>
  <rect x="535" y="712" width="130" height="32" rx="4" fill="#FFFFFF" stroke="#E8F6FD"/>
  <text x="600" y="733" fill="#11567F" font-size="10" font-weight="bold" text-anchor="middle">CASES</text>
  <text x="100" y="766" fill="#29B5E8" font-size="10" font-weight="bold">Runtime Tables</text>
  <rect x="100" y="778" width="170" height="32" rx="4" fill="#FFFFFF" stroke="#E8F6FD"/>
  <text x="185" y="799" fill="#11567F" font-size="10" font-weight="bold" text-anchor="middle">CALL_TRANSCRIPTS</text>
  <rect x="290" y="778" width="190" height="32" rx="4" fill="#FFFFFF" stroke="#E8F6FD"/>
  <text x="385" y="799" fill="#11567F" font-size="9" font-weight="bold" text-anchor="middle">CALL_CANDIDATE_VALUES</text>
  <text x="900" y="700" fill="#29B5E8" font-size="10" font-weight="bold">Internal Stage</text>
  <rect x="900" y="712" width="180" height="50" rx="6" fill="#FFFFFF" stroke="#E8F6FD"/>
  <ellipse cx="990" cy="718" rx="90" ry="6" fill="#E8F6FD"/>
  <text x="990" y="744" fill="#11567F" font-size="11" font-weight="bold" text-anchor="middle">@STG.TRANSCRIPTS</text>
</svg>
