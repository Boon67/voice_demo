<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="er-one" markerWidth="12" markerHeight="12" refX="12" refY="6" orient="auto">
      <line x1="10" y1="2" x2="10" y2="10" stroke="#11567F" stroke-width="2"/>
    </marker>
    <marker id="er-many" markerWidth="16" markerHeight="12" refX="0" refY="6" orient="auto">
      <line x1="0" y1="6" x2="12" y2="2" stroke="#11567F" stroke-width="1.5"/>
      <line x1="0" y1="6" x2="12" y2="10" stroke="#11567F" stroke-width="1.5"/>
      <line x1="0" y1="6" x2="12" y2="6" stroke="#11567F" stroke-width="1.5"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>
  <!-- Outer container -->
  <rect x="20" y="20" width="1400" height="860" rx="8" fill="#F2FAFE" stroke="#E8F6FD"/>
  <!-- Title bar -->
  <rect x="40" y="35" width="1360" height="50" rx="6" fill="#11567F"/>
  <text x="60" y="66" fill="#FFFFFF" font-size="16" font-weight="bold">CALL CENTER AI — ENTITY RELATIONSHIP DIAGRAM</text>
  <rect x="1230" y="44" width="150" height="30" rx="4" fill="#29B5E8"/>
  <text x="1258" y="64" fill="#FFFFFF" font-size="11" font-weight="bold">Snowflake Cortex AI</text>

  <!-- CUSTOMERS -->
  <g filter="url(#shadow)">
    <rect x="60" y="120" width="260" height="210" rx="6" fill="#EBF5FB" stroke="#11567F"/>
    <rect x="60" y="120" width="260" height="32" rx="6" fill="#29B5E8" stroke="#11567F"/>
    <rect x="60" y="146" width="260" height="6" fill="#29B5E8"/>
    <text x="190" y="142" fill="#FFFFFF" font-size="13" font-weight="bold" text-anchor="middle">CUSTOMERS</text>
    <text x="76" y="172" fill="#11567F" font-size="11" font-weight="bold">PK  customer_id</text>
    <line x1="60" y1="180" x2="320" y2="180" stroke="#D6EAF8"/>
    <text x="76" y="198" fill="#11567F" font-size="11">name</text>
    <text x="76" y="216" fill="#11567F" font-size="11">email</text>
    <text x="76" y="234" fill="#11567F" font-size="11">phone</text>
    <text x="76" y="252" fill="#11567F" font-size="11">loyalty_tier</text>
    <text x="76" y="270" fill="#11567F" font-size="11">address</text>
  </g>

  <!-- PRODUCTS -->
  <g filter="url(#shadow)">
    <rect x="60" y="400" width="260" height="190" rx="6" fill="#EBF5FB" stroke="#11567F"/>
    <rect x="60" y="400" width="260" height="32" rx="6" fill="#29B5E8" stroke="#11567F"/>
    <rect x="60" y="426" width="260" height="6" fill="#29B5E8"/>
    <text x="190" y="422" fill="#FFFFFF" font-size="13" font-weight="bold" text-anchor="middle">PRODUCTS</text>
    <text x="76" y="452" fill="#11567F" font-size="11" font-weight="bold">PK  product_id</text>
    <line x1="60" y1="460" x2="320" y2="460" stroke="#D6EAF8"/>
    <text x="76" y="478" fill="#11567F" font-size="11">name</text>
    <text x="76" y="496" fill="#11567F" font-size="11">category</text>
    <text x="76" y="514" fill="#11567F" font-size="11">price</text>
    <text x="76" y="532" fill="#11567F" font-size="11">sku</text>
  </g>

  <!-- ORDERS -->
  <g filter="url(#shadow)">
    <rect x="400" y="120" width="260" height="260" rx="6" fill="#EBF5FB" stroke="#11567F"/>
    <rect x="400" y="120" width="260" height="32" rx="6" fill="#29B5E8" stroke="#11567F"/>
    <rect x="400" y="146" width="260" height="6" fill="#29B5E8"/>
    <text x="530" y="142" fill="#FFFFFF" font-size="13" font-weight="bold" text-anchor="middle">ORDERS</text>
    <text x="416" y="172" fill="#11567F" font-size="11" font-weight="bold">PK  order_id</text>
    <line x1="400" y1="180" x2="660" y2="180" stroke="#D6EAF8"/>
    <text x="416" y="198" fill="#11567F" font-size="11" font-weight="bold">FK  customer_id</text>
    <text x="416" y="216" fill="#11567F" font-size="11">order_number</text>
    <text x="416" y="234" fill="#11567F" font-size="11">order_date</text>
    <text x="416" y="252" fill="#11567F" font-size="11">status</text>
    <text x="416" y="270" fill="#11567F" font-size="11">total</text>
    <text x="416" y="288" fill="#11567F" font-size="11">tracking_number</text>
  </g>

  <!-- ORDER_ITEMS -->
  <g filter="url(#shadow)">
    <rect x="400" y="440" width="260" height="190" rx="6" fill="#EBF5FB" stroke="#11567F"/>
    <rect x="400" y="440" width="260" height="32" rx="6" fill="#29B5E8" stroke="#11567F"/>
    <rect x="400" y="466" width="260" height="6" fill="#29B5E8"/>
    <text x="530" y="462" fill="#FFFFFF" font-size="13" font-weight="bold" text-anchor="middle">ORDER_ITEMS</text>
    <text x="416" y="492" fill="#11567F" font-size="11" font-weight="bold">PK  item_id</text>
    <line x1="400" y1="500" x2="660" y2="500" stroke="#D6EAF8"/>
    <text x="416" y="518" fill="#11567F" font-size="11" font-weight="bold">FK  order_id</text>
    <text x="416" y="536" fill="#11567F" font-size="11" font-weight="bold">FK  product_id</text>
    <text x="416" y="554" fill="#11567F" font-size="11">quantity</text>
    <text x="416" y="572" fill="#11567F" font-size="11">price</text>
  </g>

  <!-- CASES -->
  <g filter="url(#shadow)">
    <rect x="740" y="120" width="280" height="340" rx="6" fill="#EBF5FB" stroke="#11567F"/>
    <rect x="740" y="120" width="280" height="32" rx="6" fill="#29B5E8" stroke="#11567F"/>
    <rect x="740" y="146" width="280" height="6" fill="#29B5E8"/>
    <text x="880" y="142" fill="#FFFFFF" font-size="13" font-weight="bold" text-anchor="middle">CASES</text>
    <text x="756" y="172" fill="#11567F" font-size="11" font-weight="bold">PK  case_id</text>
    <line x1="740" y1="180" x2="1020" y2="180" stroke="#D6EAF8"/>
    <text x="756" y="198" fill="#11567F" font-size="11">case_number</text>
    <text x="756" y="216" fill="#11567F" font-size="11">customer_id</text>
    <text x="756" y="234" fill="#11567F" font-size="11">customer_name</text>
    <text x="756" y="252" fill="#11567F" font-size="11">product_name</text>
    <text x="756" y="270" fill="#11567F" font-size="11">case_type</text>
    <text x="756" y="288" fill="#11567F" font-size="11">status</text>
    <text x="756" y="306" fill="#11567F" font-size="11">priority</text>
    <text x="756" y="324" fill="#11567F" font-size="11">issue_description</text>
    <text x="756" y="342" fill="#11567F" font-size="11">resolution</text>
    <text x="756" y="360" fill="#11567F" font-size="11">opened_date</text>
  </g>

  <!-- CALL_TRANSCRIPTS -->
  <g filter="url(#shadow)">
    <rect x="1080" y="120" width="280" height="220" rx="6" fill="#EBF5FB" stroke="#11567F"/>
    <rect x="1080" y="120" width="280" height="32" rx="6" fill="#29B5E8" stroke="#11567F"/>
    <rect x="1080" y="146" width="280" height="6" fill="#29B5E8"/>
    <text x="1220" y="142" fill="#FFFFFF" font-size="13" font-weight="bold" text-anchor="middle">CALL_TRANSCRIPTS</text>
    <text x="1096" y="172" fill="#11567F" font-size="11" font-weight="bold">PK  transcript_id</text>
    <line x1="1080" y1="180" x2="1360" y2="180" stroke="#D6EAF8"/>
    <text x="1096" y="198" fill="#11567F" font-size="11">case_id</text>
    <text x="1096" y="216" fill="#11567F" font-size="11">call_id</text>
    <text x="1096" y="234" fill="#11567F" font-size="11">chunk_number</text>
    <text x="1096" y="252" fill="#11567F" font-size="11">transcript_text</text>
    <text x="1096" y="270" fill="#11567F" font-size="11">created_at</text>
  </g>

  <!-- CALL_CANDIDATE_VALUES -->
  <g filter="url(#shadow)">
    <rect x="1080" y="390" width="280" height="220" rx="6" fill="#EBF5FB" stroke="#11567F"/>
    <rect x="1080" y="390" width="280" height="32" rx="6" fill="#29B5E8" stroke="#11567F"/>
    <rect x="1080" y="416" width="280" height="6" fill="#29B5E8"/>
    <text x="1220" y="412" fill="#FFFFFF" font-size="12" font-weight="bold" text-anchor="middle">CALL_CANDIDATE_VALUES</text>
    <text x="1096" y="442" fill="#11567F" font-size="11" font-weight="bold">PK  id</text>
    <line x1="1080" y1="450" x2="1360" y2="450" stroke="#D6EAF8"/>
    <text x="1096" y="468" fill="#11567F" font-size="11">case_id</text>
    <text x="1096" y="486" fill="#11567F" font-size="11">call_id</text>
    <text x="1096" y="504" fill="#11567F" font-size="11">field_name</text>
    <text x="1096" y="522" fill="#11567F" font-size="11">field_value</text>
    <text x="1096" y="540" fill="#11567F" font-size="11">created_at</text>
  </g>

  <!-- Relationship lines -->
  <!-- CUSTOMERS 1:N ORDERS -->
  <line x1="320" y1="225" x2="400" y2="225" stroke="#11567F" stroke-width="2" marker-start="url(#er-one)" marker-end="url(#er-many)"/>
  <!-- ORDERS 1:N ORDER_ITEMS -->
  <line x1="530" y1="380" x2="530" y2="440" stroke="#11567F" stroke-width="2" marker-start="url(#er-one)" marker-end="url(#er-many)"/>
  <!-- PRODUCTS 1:N ORDER_ITEMS -->
  <line x1="320" y1="495" x2="400" y2="535" stroke="#11567F" stroke-width="2" marker-start="url(#er-one)" marker-end="url(#er-many)"/>
  <!-- CUSTOMERS 1:N CASES (logical, dashed) -->
  <line x1="320" y1="160" x2="740" y2="160" stroke="#11567F" stroke-width="2" stroke-dasharray="6,4" marker-start="url(#er-one)" marker-end="url(#er-many)"/>

  <!-- Legend -->
  <text x="740" y="840" fill="#11567F" font-size="10">--- solid = physical FK    - - - dashed = logical FK</text>
</svg>
