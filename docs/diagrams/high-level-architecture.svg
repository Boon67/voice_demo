<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 800" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#29B5E8"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>
  <!-- Outer container -->
  <rect x="20" y="20" width="1400" height="760" rx="8" fill="#F2FAFE" stroke="#E8F6FD" stroke-width="1"/>
  <!-- Title bar -->
  <rect x="40" y="35" width="1360" height="50" rx="6" fill="#11567F"/>
  <text x="60" y="66" fill="#FFFFFF" font-size="16" font-weight="bold">CALL CENTER AI — HIGH-LEVEL ARCHITECTURE</text>
  <rect x="1190" y="44" width="150" height="30" rx="4" fill="#29B5E8"/>
  <text x="1218" y="64" fill="#FFFFFF" font-size="11" font-weight="bold">Snowflake Cortex AI</text>
  <!-- Layer 1: Presentation -->
  <rect x="60" y="100" width="1280" height="120" rx="6" fill="#EBF5FB" stroke="#D6EAF8"/>
  <text x="75" y="118" fill="#11567F" font-size="11" font-weight="bold">01  PRESENTATION</text>
  <rect x="540" y="130" width="320" height="60" rx="6" fill="#FFFFFF" stroke="#29B5E8" stroke-width="2" filter="url(#shadow)"/>
  <text x="660" y="160" fill="#11567F" font-size="14" font-weight="bold" text-anchor="middle">React UI</text>
  <text x="660" y="178" fill="#11567F" font-size="10" text-anchor="middle">port 3000</text>
  <!-- Arrow 1 -->
  <line x1="700" y1="195" x2="700" y2="255" stroke="#29B5E8" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="715" y="228" fill="#11567F" font-size="10">WebSocket</text>
  <!-- Layer 2: API & Orchestration -->
  <rect x="60" y="250" width="1280" height="120" rx="6" fill="#D6EAF8" stroke="#29B5E8"/>
  <text x="75" y="268" fill="#11567F" font-size="11" font-weight="bold">02  API &amp; ORCHESTRATION</text>
  <rect x="380" y="282" width="220" height="55" rx="6" fill="#FFFFFF" stroke="#29B5E8" stroke-width="2" filter="url(#shadow)"/>
  <text x="490" y="309" fill="#11567F" font-size="13" font-weight="bold" text-anchor="middle">FastAPI Server</text>
  <text x="490" y="325" fill="#11567F" font-size="10" text-anchor="middle">port 8080</text>
  <rect x="800" y="282" width="220" height="55" rx="6" fill="#FFFFFF" stroke="#29B5E8" stroke-width="2" filter="url(#shadow)"/>
  <text x="910" y="315" fill="#11567F" font-size="13" font-weight="bold" text-anchor="middle">Audio Pipeline (ffmpeg)</text>
  <!-- Arrow 2 -->
  <line x1="700" y1="345" x2="700" y2="410" stroke="#29B5E8" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="715" y="382" fill="#11567F" font-size="10">Snowflake Connector</text>
  <!-- Layer 3: Snowflake Cortex AI -->
  <rect x="60" y="405" width="1280" height="120" rx="6" fill="#29B5E8" fill-opacity="0.12" stroke="#29B5E8"/>
  <text x="75" y="423" fill="#11567F" font-size="11" font-weight="bold">03  SNOWFLAKE CORTEX AI</text>
  <rect x="120" y="440" width="200" height="50" rx="6" fill="#29B5E8" stroke="#11567F"/>
  <text x="220" y="470" fill="#FFFFFF" font-size="12" font-weight="bold" text-anchor="middle">AI_TRANSCRIBE</text>
  <rect x="400" y="440" width="200" height="50" rx="6" fill="#29B5E8" stroke="#11567F"/>
  <text x="500" y="470" fill="#FFFFFF" font-size="12" font-weight="bold" text-anchor="middle">AI_EXTRACT</text>
  <rect x="680" y="440" width="200" height="50" rx="6" fill="#29B5E8" stroke="#11567F"/>
  <text x="780" y="470" fill="#FFFFFF" font-size="12" font-weight="bold" text-anchor="middle">AI_SIMILARITY</text>
  <rect x="960" y="440" width="200" height="50" rx="6" fill="#29B5E8" stroke="#11567F"/>
  <text x="1060" y="470" fill="#FFFFFF" font-size="12" font-weight="bold" text-anchor="middle">AI_COMPLETE</text>
  <!-- Arrow 3 -->
  <line x1="700" y1="500" x2="700" y2="560" stroke="#29B5E8" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="715" y="535" fill="#11567F" font-size="10">Data Flow</text>
  <!-- Layer 4: Snowflake Storage -->
  <rect x="60" y="555" width="1280" height="200" rx="6" fill="#11567F"/>
  <text x="75" y="575" fill="#FFFFFF" font-size="11" font-weight="bold">04  SNOWFLAKE STORAGE</text>
  <!-- Hybrid Tables label -->
  <text x="100" y="602" fill="#29B5E8" font-size="10" font-weight="bold">Hybrid Tables</text>
  <rect x="100" y="612" width="140" height="36" rx="4" fill="#FFFFFF" stroke="#E8F6FD"/>
  <text x="170" y="635" fill="#11567F" font-size="11" font-weight="bold" text-anchor="middle">CUSTOMERS</text>
  <rect x="260" y="612" width="140" height="36" rx="4" fill="#FFFFFF" stroke="#E8F6FD"/>
  <text x="330" y="635" fill="#11567F" font-size="11" font-weight="bold" text-anchor="middle">PRODUCTS</text>
  <rect x="420" y="612" width="140" height="36" rx="4" fill="#FFFFFF" stroke="#E8F6FD"/>
  <text x="490" y="635" fill="#11567F" font-size="11" font-weight="bold" text-anchor="middle">ORDERS</text>
  <rect x="580" y="612" width="140" height="36" rx="4" fill="#FFFFFF" stroke="#E8F6FD"/>
  <text x="650" y="635" fill="#11567F" font-size="11" font-weight="bold" text-anchor="middle">CASES</text>
  <!-- Runtime Tables label -->
  <text x="100" y="672" fill="#29B5E8" font-size="10" font-weight="bold">Runtime Tables</text>
  <rect x="100" y="684" width="180" height="36" rx="4" fill="#FFFFFF" stroke="#E8F6FD"/>
  <text x="190" y="707" fill="#11567F" font-size="11" font-weight="bold" text-anchor="middle">CALL_TRANSCRIPTS</text>
  <rect x="300" y="684" width="200" height="36" rx="4" fill="#FFFFFF" stroke="#E8F6FD"/>
  <text x="400" y="707" fill="#11567F" font-size="10" font-weight="bold" text-anchor="middle">CALL_CANDIDATE_VALUES</text>
  <!-- Stage -->
  <text x="800" y="672" fill="#29B5E8" font-size="10" font-weight="bold">Stage</text>
  <rect x="800" y="680" width="180" height="50" rx="6" fill="#FFFFFF" stroke="#E8F6FD"/>
  <ellipse cx="890" cy="686" rx="90" ry="6" fill="#E8F6FD"/>
  <text x="890" y="712" fill="#11567F" font-size="11" font-weight="bold" text-anchor="middle">@STG.TRANSCRIPTS</text>
</svg>
